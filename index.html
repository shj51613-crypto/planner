<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>캘린더</title>

<style>
  body {
    font-family: Arial;
    margin: 20px;
    user-select: none;
  }

  .header {
    display: flex;
    justify-content: space-between;
    max-width: 420px;
    margin: 0 auto 10px;
    align-items: center;
  }

  button {
    cursor: pointer;
    padding: 5px 10px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    max-width: 420px;
    margin: auto;
    gap: 2px;
  }

  .day-name {
    text-align: center;
    font-weight: bold;
    background: #f3f3f3;
    padding: 5px 0;
  }

  .cell {
    min-height: 70px;
    border: 1px solid #ddd;
    padding: 4px;
    font-size: 12px;
    cursor: pointer;
  }

  .date {
    font-weight: bold;
    font-size: 11px;
  }

  .event {
    margin-top: 2px;
    padding: 2px 3px;
    font-size: 10px;
    border-radius: 3px;
    color: white;
  }

  .sun .date { color: red; }
  .sat .date { color: blue; }

  .single-day {
    background: #ffeaa7 !important;
  }

  /* 드래그 선택 표시 */
  .selected {
    outline: 2px solid #339af0;
  }
</style>
</head>

<body>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <h3 id="monthTitle"></h3>
  <button onclick="nextMonth()">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<script>
let today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();

let events = [
  { title: "회의", start: "2026-06-10", end: "2026-06-10", color: "#ff6b6b" }
];

let isDragging = false;
let dragStart = null;
let dragEnd = null;

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");

function renderCalendar(year, month) {
  calendar.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  monthTitle.innerText = `${year}년 ${month + 1}월`;

  const days = ["일","월","화","수","목","금","토"];

  days.forEach((d, i) => {
    const el = document.createElement("div");
    el.className = "day-name";
    el.innerText = d;
    calendar.appendChild(el);
  });

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= lastDate; d++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    const weekday = new Date(year, month, d).getDay();
    if (weekday === 0) cell.classList.add("sun");
    if (weekday === 6) cell.classList.add("sat");

    const fullDate =
      `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const dateEl = document.createElement("div");
    dateEl.className = "date";
    dateEl.innerText = d;
    cell.appendChild(dateEl);

    let dayEvents = events.filter(ev =>
      fullDate >= ev.start && fullDate <= ev.end
    );

    if (dayEvents.length === 1 && dayEvents[0].start === dayEvents[0].end) {
      cell.classList.add("single-day");
    }

    dayEvents.forEach(ev => {
      const evEl = document.createElement("div");
      evEl.className = "event";
      evEl.innerText = ev.title;
      evEl.style.background = ev.color;
      cell.appendChild(evEl);
    });

    // ⭐ 드래그 시작
    cell.onmousedown = () => {
      isDragging = true;
      dragStart = fullDate;
      dragEnd = fullDate;
      renderCalendar(currentYear, currentMonth);
    };

    // ⭐ 드래그 이동
    cell.onmouseenter = () => {
      if (!isDragging) return;
      dragEnd = fullDate;
      renderCalendar(currentYear, currentMonth);
    };

    // ⭐ 드래그 끝
    cell.onmouseup = () => {
      if (!isDragging) return;
      isDragging = false;

      const title = prompt(`${dragStart} ~ ${dragEnd} 일정`);
      if (!title) return;

      const [start, end] =
        dragStart < dragEnd ? [dragStart, dragEnd] : [dragEnd, dragStart];

      events.push({
        title,
        start,
        end,
        color: getRandomColor()
      });

      dragStart = null;
      dragEnd = null;

      renderCalendar(currentYear, currentMonth);
    };

    // 선택 표시
    if (dragStart && dragEnd &&
        fullDate >= Math.min(dragStart, dragEnd) &&
        fullDate <= Math.max(dragStart, dragEnd)) {
      cell.classList.add("selected");
    }

    calendar.appendChild(cell);
  }
}

function getRandomColor() {
  const colors = ["#ff6b6b","#4dabf7","#51cf66","#845ef7","#ffa94d"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  renderCalendar(currentYear, currentMonth);
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  renderCalendar(currentYear, currentMonth);
}

renderCalendar(currentYear, currentMonth);
</script>

</body>
</html>
