<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>캘린더</title>

<style>
body { font-family: Arial; margin:20px; user-select:none; }

.header {
  display:flex;
  justify-content:space-between;
  max-width:420px;
  margin:auto;
}

.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  max-width:420px;
  margin:auto;
  gap:2px;
}

.day-name {
  text-align:center;
  background:#f3f3f3;
  padding:5px;
  font-weight:bold;
}

.cell {
  min-height:70px;
  border:1px solid #ddd;
  padding:4px;
  cursor:pointer;
}

.date { font-size:11px; font-weight:bold; }

.event {
  font-size:10px;
  color:#fff;
  margin-top:2px;
  padding:2px;
  border-radius:3px;
}

/* ⭐ 모달 */
#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
}

.modal-box {
  background:white;
  width:300px;
  padding:15px;
  border-radius:8px;
  margin:120px auto;
}

.modal-box input, .modal-box select {
  width:100%;
  padding:6px;
  margin-bottom:8px;
}

.modal-box button {
  width:100%;
  padding:6px;
  margin-top:5px;
  cursor:pointer;
}

.color-box {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="prev()">◀</button>
  <h3 id="title"></h3>
  <button onclick="next()">▶</button>
</div>

<div class="calendar" id="cal"></div>

<!-- ⭐ 모달 -->
<div id="modal">
  <div class="modal-box">

    <input id="titleInput" placeholder="제목"/>

    <div class="color-box">
      <span>카테고리 색</span>
      <input type="color" id="colorInput" />
    </div>

    <input id="categoryInput" placeholder="카테고리 (예: 운동)"/>

    <button onclick="save()">저장</button>
    <button onclick="remove()">삭제</button>
    <button onclick="closeModal()">취소</button>

  </div>
</div>

<script>
let y=new Date().getFullYear();
let m=new Date().getMonth();

let events=[
  { title:"회의", start:"2026-06-10", end:"2026-06-10", category:"일", color:"#ff6b6b" }
];

let selected=null;
let selectedDate=null;

const cal=document.getElementById("cal");
const title=document.getElementById("title");

const modal=document.getElementById("modal");
const titleInput=document.getElementById("titleInput");
const categoryInput=document.getElementById("categoryInput");
const colorInput=document.getElementById("colorInput");

function dateStr(d){
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function render(){
  cal.innerHTML="";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  title.innerText=`${y}년 ${m+1}월`;

  ["일","월","화","수","목","금","토"].forEach(d=>{
    const el=document.createElement("div");
    el.className="day-name";
    el.innerText=d;
    cal.appendChild(el);
  });

  for(let i=0;i<first;i++) cal.appendChild(document.createElement("div"));

  for(let d=1; d<=last; d++){
    const cell=document.createElement("div");
    cell.className="cell";

    const ds=dateStr(d);

    const dateEl=document.createElement("div");
    dateEl.className="date";
    dateEl.innerText=d;
    cell.appendChild(dateEl);

    let dayEvents=events.filter(e=>ds>=e.start && ds<=e.end);

    dayEvents.forEach(ev=>{
      const e=document.createElement("div");
      e.className="event";
      e.innerText=`${ev.title} (${ev.category})`;
      e.style.background=ev.color;

      e.onclick=(event)=>{
        event.stopPropagation();
        openModal(ev, ds);
      };

      cell.appendChild(e);
    });

    cell.onclick=()=>{
      openModal(null, ds);
    };

    cal.appendChild(cell);
  }
}

// ⭐ 모달 열기
function openModal(ev, ds){
  selected=ev;
  selectedDate=ds;

  if(ev){
    titleInput.value=ev.title;
    categoryInput.value=ev.category;
    colorInput.value=ev.color;
  } else {
    titleInput.value="";
    categoryInput.value="";
    colorInput.value="#4dabf7";
  }

  modal.style.display="block";
}

// ⭐ 저장
function save(){
  const t=titleInput.value;
  const c=categoryInput.value;
  const col=colorInput.value;

  if(!t) return;

  if(selected){
    selected.title=t;
    selected.category=c;
    selected.color=col;
  } else {
    events.push({
      title:t,
      start:selectedDate,
      end:selectedDate,
      category:c,
      color:col
    });
  }

  closeModal();
  render();
}

// ⭐ 삭제
function remove(){
  if(!selected) return;

  events=events.filter(e=>e!==selected);
  closeModal();
  render();
}

function closeModal(){
  modal.style.display="none";
  selected=null;
  selectedDate=null;
}

function prev(){ m--; if(m<0){m=11;y--;} render(); }
function next(){ m++; if(m>11){m=0;y++;} render(); }

render();
</script>

</body>
</html>
