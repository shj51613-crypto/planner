<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>캘린더 (추가/수정/삭제 복구)</title>

<style>
body { font-family: Arial; margin:20px; }

.nav { display:flex; gap:10px; margin-bottom:10px; }

button { cursor:pointer; padding:6px; }

.page { display:none; }
.active { display:block; }

.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  max-width:700px;
}

.cell {
  min-height:80px;
  border:1px solid #ddd;
  padding:4px;
  font-size:12px;
  cursor:pointer;
}

.event {
  font-size:10px;
  color:#fff;
  padding:2px;
  margin-top:2px;
  border-radius:3px;
}

/* 모달 */
#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
}

.modal-box {
  background:#fff;
  width:300px;
  margin:120px auto;
  padding:15px;
  border-radius:8px;
}

.modal-box input {
  width:100%;
  padding:6px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="showPage('cal')">캘린더</button>
  <button onclick="showPage('tracker')">타임트래커</button>
</div>

<!-- 캘린더 -->
<div id="calPage" class="page active">
  <div class="calendar" id="cal"></div>
</div>

<!-- 타임트래커 -->
<div id="trackerPage" class="page">
