<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>캘린더</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 420px;
    margin: 0 auto 10px;
  }

  button {
    cursor: pointer;
    padding: 5px 10px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    max-width: 420px;
    margin: 0 auto;
    gap: 2px;
  }

  .day-name {
    font-weight: bold;
    text-align: center;
    padding: 5px 0;
    background: #f0f0f0;
  }

  .cell {
    min-height: 60px;
    border: 1px solid #ddd;
    padding: 4px;
    font-size: 12px;
    position: relative;
  }

  .date {
    font-weight: bold;
    font-size: 11px;
  }

  .event {
    margin-top: 2px;
    padding: 2px 3px;
    font-size: 10px;
    border-radius: 3px;
    color: white;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* 1일짜리 일정 강조 */
  .single-day {
    background: #ffe58a !important;
  }

</style>
</head>

<body>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <h3 id="monthTitle"></h3>
  <button onclick="nextMonth()">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");

let today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();

// 예시 일정 데이터
let events = [
  { title: "회의", date: "2026-06-10", color: "#ff6b6b" },
  { title: "운동", date: "2026-06-10", color: "#4dabf7" },
  { title: "하루 일정", date: "2026-06-15", dateEnd: "2026-06-15", color: "#51cf66" } // 단일 일정
];

function renderCalendar(year, month) {
  calendar.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  monthTitle.innerText = `${year}년 ${month + 1}월`;

  const days = ["일", "월", "화", "수", "목", "금", "토"];
  days.forEach(d => {
    const el = document.createElement("div");
    el.className = "day-name";
    el.innerText = d;
    calendar.appendChild(el);
  });

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let date = 1; date <= lastDate; date++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    const fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;

    const dateEl = document.createElement("div");
    dateEl.className = "date";
    dateEl.innerText = date;

    cell.appendChild(dateEl);

    let dayEvents = events.filter(e => e.date === fullDate);

    // 단일 일정 여부 체크 (1일짜리)
    if (dayEvents.length === 1 && !dayEvents[0].dateEnd) {
      cell.classList.add("single-day");
    }

    dayEvents.forEach(ev => {
      const evEl = document.createElement("div");
      evEl.className = "event";
      evEl.innerText = ev.title;
      evEl.style.background = ev.color;
      cell.appendChild(evEl);
    });

    calendar.appendChild(cell);
  }
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  renderCalendar(currentYear, currentMonth);
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  renderCalendar(currentYear, currentMonth);
}

renderCalendar(currentYear, currentMonth);
</script>

</body>
</html>
