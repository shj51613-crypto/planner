<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>캘린더 + 타임트래커 변환</title>

<style>
body { font-family: Arial; margin:20px; }

.layout {
  display:flex;
  gap:20px;
  max-width:900px;
  margin:auto;
}

.calendar {
  flex:1;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}

.cell {
  min-height:70px;
  border:1px solid #ddd;
  padding:4px;
  font-size:12px;
}

.event {
  font-size:10px;
  color:#fff;
  padding:2px;
  margin-top:2px;
  border-radius:3px;
  cursor:pointer;
}

/* 타임트래커 */
.tracker {
  width:300px;
  border:1px solid #ddd;
  padding:10px;
  border-radius:8px;
}

.log {
  font-size:12px;
  border-bottom:1px solid #eee;
  padding:4px 0;
}

button {
  width:100%;
  margin:4px 0;
  padding:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="layout">

  <div class="calendar" id="cal"></div>

  <div class="tracker">

    <h3>타임트래커</h3>

    <div id="logList"></div>

  </div>

</div>

<script>
/* ⭐ 캘린더 일정 */
let events=[
  {
    title:"회의",
    date:"2026-06-15",
    start:"10:00",
    end:"11:00",
    color:"#ff6b6b"
  },
  {
    title:"공부",
    date:"2026-06-15",
    start:"14:00",
    end:"16:30",
    color:"#4dabf7"
  }
];

/* ⭐ 타임로그 */
let logs=[];

const cal=document.getElementById("cal");

/* 날짜 */
function dateStr(d){
  return `2026-06-${String(d).padStart(2,'0')}`;
}

/* 캘린더 */
function render(){
  cal.innerHTML="";

  for(let d=1; d<=30; d++){
    const cell=document.createElement("div");
    cell.className="cell";

    const ds=dateStr(d);

    cell.innerHTML=`<b>${d}</b>`;

    events.filter(e=>e.date===ds).forEach(ev=>{
      const div=document.createElement("div");
      div.className="event";
      div.style.background=ev.color;

      div.innerHTML=`
        ${ev.title}<br>
        ${ev.start} ~ ${ev.end}<br>
        <button onclick="convert('${ev.title}','${ev.date}','${ev.start}','${ev.end}')">
          타임트래커로 변환
        </button>
      `;

      cell.appendChild(div);
    });

    cal.appendChild(cell);
  }
}

/* ⭐ 시간 계산 */
function calcDuration(start, end){
  let [sh, sm]=start.split(":").map(Number);
  let [eh, em]=end.split(":").map(Number);

  return (eh*60+em) - (sh*60+sm);
}

/* ⭐ 변환 */
function convert(title, date, start, end){
  const duration = calcDuration(start,end);

  logs.push({
    task:title,
    date,
    start,
    end,
    duration
  });

  renderLogs();
}

/* ⭐ 로그 출력 */
function renderLogs(){
  const box=document.getElementById("logList");
  box.innerHTML="";

  logs.slice().reverse().forEach(l=>{
    const div=document.createElement("div");
    div.className="log";

    const h=Math.floor(l.duration/60);
    const m=l.duration%60;

    div.innerHTML=`
      ${l.task}<br>
      ${l.date}<br>
      ${l.start} ~ ${l.end}<br>
      <b>${h}시간 ${m}분</b>
    `;

    box.appendChild(div);
  });
}

render();
renderLogs();
</script>

</body>
</html>
