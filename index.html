<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Main Planner</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#ffffff;
    padding:20px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.month{
    font-size:24px;
    font-weight:700;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:10px;
}

.weekdays div{
    text-align:center;
    font-weight:600;
    padding:10px 0;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:1px;
    background:#ddd;
}

.day{
    background:white;
    min-height:120px;
    padding:6px;
}

.date{
    font-size:14px;
    font-weight:700;
    margin-bottom:6px;
}

.event{
    font-size:12px;
    margin-bottom:4px;
}

.task{
    font-size:12px;
    margin-bottom:4px;
}

.range{
    font-size:12px;
    color:#d26c6c;
    font-weight:600;
}

</style>
</head>

<body>

<div class="header">
    <div class="month">2026년 6월</div>
</div>

<div class="weekdays">
    <div>일</div>
    <div>월</div>
    <div>화</div>
    <div>수</div>
    <div>목</div>
    <div>금</div>
    <div>토</div>
</div>

<div class="calendar">

    <div class="day"></div>

    <div class="day">
        <div class="date">1</div>
    </div>

    <div class="day">
        <div class="date">2</div>
    </div>

    <div class="day">
        <div class="date">3</div>
    </div>

    <div class="day">
        <div class="date">4</div>
    </div>

    <div class="day">
        <div class="date">5</div>
    </div>

    <div class="day">
        <div class="date">6</div>
    </div>

    <div class="day">
        <div class="date">7</div>
    </div>

    <div class="day">
        <div class="date">8</div>
    </div>

    <div class="day">
        <div class="date">9</div>
    </div>

    <div class="day">
        <div class="date">10</div>
        <div class="event">고정지출</div>
    </div>

    <div class="day">
        <div class="date">11</div>
    </div>

    <div class="day">
        <div class="date">12</div>
    </div>

    <div class="day">
        <div class="date">13</div>
    </div>

    <div class="day">
        <div class="date">14</div>
    </div>

    <div class="day">
        <div class="date">15</div>

        <div class="task">
            ☐ 메가젠
        </div>

        <div class="task">
            ☑ 자동차
        </div>
    </div>

    <div class="day">
        <div class="date">16</div>
    </div>

    <div class="day">
        <div class="date">17</div>
    </div>

    <div class="day">
        <div class="date">18</div>
    </div>

    <div class="day">
        <div class="date">19</div>
    </div>

    <div class="day">
        <div class="date">20</div>
    </div>

    <div class="day">
        <div class="date">21</div>
    </div>

    <div class="day">
        <div class="date">22</div>
    </div>

    <div class="day">
        <div class="date">23</div>
        <div class="range">← 여행</div>
    </div>

    <div class="day">
        <div class="date">24</div>
        <div class="range">────</div>
    </div>

    <div class="day">
        <div class="date">25</div>
        <div class="range">────→</div>
    </div>

    <div class="day">
        <div class="date">26</div>
    </div>

    <div class="day">
        <div class="date">27</div>
    </div>

    <div class="day">
        <div class="date">28</div>
    </div>

    <div class="day">
        <div class="date">29</div>
    </div>

    <div class="day">
        <div class="date">30</div>
    </div>

</div>

</body>
</html>
